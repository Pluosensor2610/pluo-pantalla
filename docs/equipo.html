<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluo Admin — Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fondo: #16181C;
    --superficie: #1F2227;
    --superficie2: #262A30;
    --borde: rgba(226, 76, 76, 0.25);
    --rojo: #E24C4C;
    --verde: #2FB65A;
    --texto: #F0F0F0;
    --texto-tenue: #8A8F98;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; background: var(--fondo);
    font-family: 'Manrope', sans-serif; color: var(--texto);
  }
  header {
    background: var(--superficie); border-bottom: 1px solid var(--borde);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  #btnVolver {
    background: rgba(255,255,255,0.08); border: none; color: var(--texto);
    width: 34px; height: 34px; border-radius: 8px; font-size: 18px; cursor: pointer;
  }
  header h1 { font-size: 16px; margin: 0; flex: 1; }
  header p { font-size: 11px; margin: 0; color: var(--texto-tenue); font-family: 'IBM Plex Mono', monospace; }
  .punto-conexion { width: 10px; height: 10px; border-radius: 50%; background: var(--texto-tenue); }
  .punto-conexion.conectado { background: var(--verde); }

  main { max-width: 560px; margin: 0 auto; padding: 16px; }

  .seccion {
    background: var(--superficie); border: 1px solid var(--borde);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }
  .seccion h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--texto-tenue); margin: 0 0 12px 0;
  }

  .fila-salida {
    display: grid;
    grid-template-columns: 30px 1fr 1fr 1fr 70px;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .fila-salida .n { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--texto-tenue); }

  select, input {
    background: var(--superficie2); border: 1px solid var(--borde);
    border-radius: 6px; color: var(--texto); padding: 7px 8px; font-size: 12px;
    font-family: 'Manrope', sans-serif; width: 100%;
  }

  .fila-doble { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .fila-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }

  button.accion {
    background: var(--rojo); color: #16181C; border: none; border-radius: 6px;
    padding: 7px 10px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  button.accion:active { opacity: 0.8; }
  button.secundaria {
    background: transparent; color: var(--texto); border: 1px solid var(--borde);
  }
  button.peligro { background: var(--rojo); color: white; width: 100%; padding: 12px; font-size: 14px; margin-bottom: 8px; }
  button.exito { background: var(--verde); color: #16181C; width: 100%; padding: 12px; font-size: 14px; }

  .log {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--texto-tenue);
    margin-top: 8px; white-space: pre-wrap; max-height: 100px; overflow-y: auto;
  }
</style>
</head>
<body>

<header>
  <button id="btnVolver">‹</button>
  <div style="flex:1;">
    <h1 id="nombreEquipo">Cargando…</h1>
    <p id="deviceIdTexto"></p>
  </div>
  <div class="punto-conexion" id="puntoConexion"></div>
</header>

<main>

  <div class="seccion">
    <h2>Configuración de Salidas (SETSALIDA)</h2>
    <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--texto-tenue); margin-bottom:12px; cursor:pointer;">
      <input type="checkbox" id="chkOcultarSinUsar" onchange="window.aplicarFiltroSalidas()">
      Ocultar salidas sin usar
    </label>
    <div id="filasSalidas"></div>
  </div>

  <div class="seccion">
    <h2>Caudal (SETCAUDAL / SETCAUDALSECTOR)</h2>
    <div class="fila-triple">
      <select id="tipoAgua">
        <option value="0">Agua: sin caudalímetro</option>
        <option value="1">Agua: factor 100 L/pulso</option>
        <option value="2">Agua: factor 1000 L/pulso</option>
        <option value="3">Agua: factor 10000 L/pulso</option>
      </select>
      <select id="tipoFert">
        <option value="0">Fert: sin caudalímetro</option>
        <option value="1">Fert: factor 0.1 L/pulso (100cc)</option>
        <option value="2">Fert: factor 1 L/pulso</option>
      </select>
      <button class="accion" onclick="enviarSetCaudal()">Guardar tipos</button>
    </div>
    <div class="fila-triple">
      <input type="number" id="sectorCaudal" placeholder="N° sector">
      <input type="number" id="caudalEsperado" placeholder="Caudal esp. (m³/h)">
      <button class="accion" onclick="enviarSetCaudalSector()">Guardar</button>
    </div>
  </div>

  <div class="seccion">
    <h2>Zona Horaria (SETZONA)</h2>
    <div class="fila-doble">
      <select id="zonaHoraria">
        <option value="-4">UTC -4 (invierno)</option>
        <option value="-3">UTC -3 (verano)</option>
      </select>
      <button class="accion" onclick="enviarSetZona()">Aplicar</button>
    </div>
  </div>

  <div class="seccion">
    <h2>Ajustar Hora (SETHORA)</h2>
    <button class="accion secundaria" style="width:100%;" onclick="enviarSetHora()">
      Sincronizar con hora de este navegador
    </button>
  </div>

  <div class="seccion">
    <h2>Tokens de Acceso (SETTOKENOP / SETTOKENOBS)</h2>
    <div class="fila-doble">
      <input type="text" id="nuevoTokenOp" placeholder="Nuevo token Operador">
      <button class="accion" onclick="enviarSetTokenOp()">Guardar</button>
    </div>
    <div class="fila-doble">
      <input type="text" id="nuevoTokenObs" placeholder="Nuevo token Observador">
      <button class="accion" onclick="enviarSetTokenObs()">Guardar</button>
    </div>
  </div>

  <div class="seccion">
    <h2>Bloqueo del Equipo</h2>
    <button class="peligro" onclick="enviarBloqueo(true)">BLOQUEAR equipo</button>
    <button class="exito" onclick="enviarBloqueo(false)">DESBLOQUEAR equipo</button>
  </div>

  <div class="seccion">
    <h2>Programas de Riego (SETPROG / SETSECTOR / SETFERT)</h2>

    <div class="fila-triple" style="margin-bottom:12px;">
      <select id="progSeleccionado" onchange="window.cambiarProgramaUI()">
        <option value="0">Riego</option>
        <option value="1">Aux 1</option>
        <option value="2">Aux 2</option>
      </select>
      <button class="accion secundaria" onclick="window.cargarPrograma()">Cargar actual</button>
      <button class="accion" onclick="window.guardarPrograma()">Guardar programa</button>
    </div>

    <div class="fila-doble" style="margin-bottom:8px;">
      <label style="display:flex; align-items:center; gap:6px; font-size:12px;">
        <input type="checkbox" id="progActivo"> Activo
      </label>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px;">
        <input type="checkbox" id="progLoop"> Loop
      </label>
    </div>

    <div class="fila-doble" style="margin-bottom:8px;">
      <input type="number" id="progHora" placeholder="Hora inicio (0-23)" min="0" max="23">
      <input type="number" id="progMin" placeholder="Minuto inicio (0-59)" min="0" max="59">
    </div>

    <div id="diasSemana" style="display:flex; gap:6px; margin-bottom:14px;"></div>

    <div id="filasSectoresPrograma"></div>
  </div>

  <div class="seccion">
    <h2>Fallas</h2>
    <button class="accion secundaria" style="width:100%;" onclick="enviarResetFallas()">
      RESETFALLAS — limpiar alerta activa
    </button>
  </div>

  <div class="log" id="logMensajes"></div>

</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore, collection, query, where, getDocs, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfW9yzIoBAGxCvxZs6679Qn0_df_rkfZg",
    authDomain: "pluo-pantalla.firebaseapp.com",
    projectId: "pluo-pantalla",
    storageBucket: "pluo-pantalla.firebasestorage.app",
    messagingSenderId: "432080738709",
    appId: "1:432080738709:web:6b83df90372f981fa27e9c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const NUM_SALIDAS = 14;
  const MAX_SECTORES = 10;
  const DIAS = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'];
  const TIPOS = ['SIN_USAR', 'RIEGO', 'BOMBA', 'BOMBA_INY', 'VALV_INY', 'AUX'];
  const ETIQUETA_TIPO = {
    SIN_USAR: 'Sin usar', RIEGO: 'RIEGO', BOMBA: 'BOMBA',
    BOMBA_INY: 'BOMBA_INY', VALV_INY: 'VALV_INY', AUX: 'AUX'
  };

  const params = new URLSearchParams(window.location.search);
  const deviceId = params.get('id');

  let mqttClient = null;
  let tokenSuperadmin = null;

  const nombreEquipo = document.getElementById('nombreEquipo');
  const deviceIdTexto = document.getElementById('deviceIdTexto');
  const puntoConexion = document.getElementById('puntoConexion');
  const filasSalidas = document.getElementById('filasSalidas');
  const logMensajes = document.getElementById('logMensajes');

  document.getElementById('btnVolver').addEventListener('click', () => {
    window.location.href = 'dashboard.html';
  });

  function log(msg) {
    const hora = new Date().toLocaleTimeString();
    logMensajes.textContent = `[${hora}] ${msg}\n` + logMensajes.textContent;
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    try {
      const snap = await getDoc(doc(db, 'Users', user.uid));
      if (!snap.exists()) throw new Error('sin acceso');
    } catch (e) {
      window.location.href = 'index.html';
      return;
    }
    await cargarEquipo(deviceId);
  });

  async function cargarEquipo(deviceId) {
    if (!deviceId) {
      nombreEquipo.textContent = 'Falta ?id= en la URL';
      return;
    }
    const q = query(collection(db, 'unidades'), where('device_id', '==', deviceId));
    const snap = await getDocs(q);
    if (snap.empty) {
      nombreEquipo.textContent = 'Equipo no encontrado';
      return;
    }
    const docRef = snap.docs[0];
    const unidad = docRef.data();
    nombreEquipo.textContent = unidad.nombre || deviceId;
    deviceIdTexto.textContent = deviceId;

    const configSnap = await getDoc(doc(db, 'unidades', docRef.id, 'admin', 'config'));
    if (!configSnap.exists()) {
      log('ERROR: no existe unidades/' + docRef.id + '/admin/config con token_superadmin');
      return;
    }
    tokenSuperadmin = configSnap.data().token_superadmin;

    construirFilasSalidas();
    construirDiasSemana();
    construirFilasSectoresPrograma();
    conectarMQTT(deviceId);
  }

  function construirFilasSalidas() {
    filasSalidas.innerHTML = '';
    for (let i = 1; i <= NUM_SALIDAS; i++) {
      const div = document.createElement('div');
      div.className = 'fila-salida';
      div.innerHTML = `
        <div class="n">${i}</div>
        <select id="tipo-${i}" onchange="window.aplicarFiltroSalidas()">
          ${TIPOS.map(t => `<option value="${t}">${ETIQUETA_TIPO[t]}</option>`).join('')}
        </select>
        <input type="number" id="sector-${i}" placeholder="Sector">
        <input type="text" id="nombre-${i}" placeholder="Nombre">
        <button class="accion" onclick="window.enviarSetSalida(${i})">Guardar</button>
      `;
      filasSalidas.appendChild(div);
    }
  }

  window.aplicarFiltroSalidas = function () {
    const ocultar = document.getElementById('chkOcultarSinUsar').checked;
    for (let i = 1; i <= NUM_SALIDAS; i++) {
      const tipo = document.getElementById(`tipo-${i}`).value;
      const fila = document.getElementById(`tipo-${i}`).closest('.fila-salida');
      fila.style.display = (ocultar && tipo === 'SIN_USAR') ? 'none' : 'grid';
    }
  };

  // Precarga los campos de una fila de salida con lo que ya está
  // guardado en el equipo (respuesta a GETSALIDA:n al conectar).
  function procesarRespuestaSalida(msg) {
    // SAL:n:tipo:sector_asoc:nombre:caudal_esperado:estado_on_off
    const p = msg.split(':');
    const n = parseInt(p[1], 10);
    const tipo = p[2];
    const sectorAsoc = p[3];
    const nombre = p[4];

    const selTipo = document.getElementById(`tipo-${n}`);
    const inpSector = document.getElementById(`sector-${n}`);
    const inpNombre = document.getElementById(`nombre-${n}`);
    if (!selTipo || !inpSector || !inpNombre) return;

    selTipo.value = tipo;
    inpSector.value = sectorAsoc;
    inpNombre.value = nombre;
    window.aplicarFiltroSalidas();
  }

  // ============================================================
  // Programas de Riego
  // ============================================================

  function construirDiasSemana() {
    const cont = document.getElementById('diasSemana');
    cont.innerHTML = DIAS.map((d, i) => `
      <label style="display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; color:var(--texto-tenue);">
        <input type="checkbox" id="dia-${i}">
        ${d}
      </label>
    `).join('');
  }

  function construirFilasSectoresPrograma() {
    const esAux = document.getElementById('progSeleccionado').value !== '0';
    const cont = document.getElementById('filasSectoresPrograma');
    cont.innerHTML = '';
    for (let s = 0; s < MAX_SECTORES; s++) {
      const div = document.createElement('div');
      div.style.cssText = 'border:1px solid var(--borde); border-radius:8px; padding:10px; margin-bottom:8px;';
      div.innerHTML = `
        <div class="fila-triple" style="margin-bottom:${esAux ? '0' : '8px'};">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px;">
            <input type="checkbox" id="sec-hab-${s}"> Sector ${s + 1}
          </label>
          <input type="number" id="sec-hh-${s}" placeholder="hh" min="0" max="23">
          <input type="number" id="sec-mm-${s}" placeholder="mm" min="0" max="59">
        </div>
        ${esAux ? '' : `
        <div class="fila-doble" style="margin-bottom:6px;">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px;">
            <input type="checkbox" id="sec-fert-activa-${s}" onchange="window.toggleFertSector(${s})"> Fertilización
          </label>
          <select id="sec-fert-tipo-${s}">
            <option value="1">Directo (litros objetivo)</option>
            <option value="2">Fraccionado (pulsos adaptativos)</option>
          </select>
        </div>
        <div class="fila-triple" id="sec-fert-campos-${s}" style="display:none;">
          <input type="number" id="sec-fert-litros-${s}" placeholder="Litros">
          <input type="number" id="sec-fert-antes-${s}" placeholder="Agua antes (min)">
          <input type="number" id="sec-fert-despues-${s}" placeholder="Agua después (min)">
        </div>`}
        <button class="accion secundaria" style="width:100%; margin-top:8px;" onclick="window.guardarSector(${s})">
          Guardar sector ${s + 1}
        </button>
      `;
      cont.appendChild(div);
    }
  }

  window.toggleFertSector = function (s) {
    const activa = document.getElementById(`sec-fert-activa-${s}`).checked;
    const campos = document.getElementById(`sec-fert-campos-${s}`);
    if (campos) campos.style.display = activa ? 'grid' : 'none';
  };

  window.cambiarProgramaUI = function () {
    construirFilasSectoresPrograma();
  };

  window.cargarPrograma = function () {
    const idx = document.getElementById('progSeleccionado').value;
    window._publicarComando(`GETPROG:${idx}`);
    // Solicita también los 10 sectores del programa
    for (let s = 0; s < MAX_SECTORES; s++) {
      window._publicarComando(`GETSECTOR:${idx}:${s}`);
    }
  };

  window.guardarPrograma = function () {
    const idx = document.getElementById('progSeleccionado').value;
    const activo = document.getElementById('progActivo').checked ? 1 : 0;
    const loop = document.getElementById('progLoop').checked ? 1 : 0;
    const esAux = idx !== '0' ? 1 : 0;
    const hora = document.getElementById('progHora').value || '0';
    const min = document.getElementById('progMin').value || '0';
    const dias = DIAS.map((_, i) => document.getElementById(`dia-${i}`).checked ? 1 : 0).join(':');
    window._publicarComando(`SETPROG:${idx}:${activo}:${loop}:${esAux}:${hora}:${min}:${dias}`);
  };

  window.guardarSector = function (s) {
    const idx = document.getElementById('progSeleccionado').value;
    const hab = document.getElementById(`sec-hab-${s}`).checked ? 1 : 0;
    const hh = document.getElementById(`sec-hh-${s}`).value || '0';
    const mm = document.getElementById(`sec-mm-${s}`).value || '0';
    window._publicarComando(`SETSECTOR:${idx}:${s}:${hab}:${hh}:${mm}`);

    // Solo el programa de riego (idx=0) tiene fertilización
    if (idx === '0') {
      const fertActiva = document.getElementById(`sec-fert-activa-${s}`).checked ? 1 : 0;
      const fertTipo = document.getElementById(`sec-fert-tipo-${s}`).value;
      const litros = document.getElementById(`sec-fert-litros-${s}`).value || '0';
      const antes = document.getElementById(`sec-fert-antes-${s}`).value || '0';
      const despues = document.getElementById(`sec-fert-despues-${s}`).value || '0';
      window._publicarComando(`SETFERT:${idx}:${s}:${fertActiva}:${fertTipo}:${litros}:${antes}:${despues}`);
    }
  };

  // Parser de respuestas PROG:/SEC: para precargar la UI tras GETPROG/GETSECTOR
  function procesarRespuestaPrograma(msg) {
    if (msg.startsWith('PROG:')) {
      const p = msg.split(':');
      // PROG:idx:activo:loop:es_auxiliar:hora:min:Lu:Ma:Mi:Ju:Vi:Sa:Do
      const idxSel = document.getElementById('progSeleccionado').value;
      if (p[1] !== idxSel) return;
      document.getElementById('progActivo').checked = p[2] === '1';
      document.getElementById('progLoop').checked = p[3] === '1';
      document.getElementById('progHora').value = p[5];
      document.getElementById('progMin').value = p[6];
      for (let i = 0; i < 7; i++) {
        const chk = document.getElementById(`dia-${i}`);
        if (chk) chk.checked = p[7 + i] === '1';
      }
    } else if (msg.startsWith('SEC:')) {
      const p = msg.split(':');
      // SEC:prog:sector:hab:hh:mm:fert_activa:fert_tipo:litros:agua_antes:agua_despues
      const idxSel = document.getElementById('progSeleccionado').value;
      if (p[1] !== idxSel) return;
      const s = parseInt(p[2], 10);
      document.getElementById(`sec-hab-${s}`).checked = p[3] === '1';
      document.getElementById(`sec-hh-${s}`).value = p[4];
      document.getElementById(`sec-mm-${s}`).value = p[5];
      const fertActiva = document.getElementById(`sec-fert-activa-${s}`);
      if (fertActiva) {
        fertActiva.checked = p[6] === '1';
        document.getElementById(`sec-fert-tipo-${s}`).value = p[7];
        document.getElementById(`sec-fert-litros-${s}`).value = p[8];
        document.getElementById(`sec-fert-antes-${s}`).value = p[9];
        document.getElementById(`sec-fert-despues-${s}`).value = p[10];
        window.toggleFertSector(s);
      }
    }
  }

  function conectarMQTT(deviceId) {
    mqttClient = mqtt.connect('wss://e0b71edcce184b74a7a5a87fc9d2b605.s1.eu.hivemq.cloud:8884/mqtt', {
      username: 'pluo_web_client',
      password: 'Pluo2610',
      clientId: 'web_admin_' + Math.random().toString(16).slice(2)
    });

    mqttClient.on('connect', () => {
      puntoConexion.classList.add('conectado');
      mqttClient.subscribe(`pluo/${deviceId}/resp`);
      log('Conectado al broker.');

      // Precargar la config real de salidas -- antes este panel siempre
      // se veía vacío al cargar, aunque el equipo ya tuviera todo
      // guardado (nunca pedía GETSALIDA, solo servía para escribir).
      for (let i = 1; i <= NUM_SALIDAS; i++) {
        mqttClient.publish(`pluo/${deviceId}/cmd`, `${tokenSuperadmin}:GETSALIDA:${i}`);
      }
    });

    mqttClient.on('message', (topic, mensaje) => {
      const texto = mensaje.toString();
      log('RESP: ' + texto);
      if (texto.startsWith('SAL:')) {
        procesarRespuestaSalida(texto);
        return;
      }
      procesarRespuestaPrograma(texto);
    });

    mqttClient.on('error', (err) => {
      puntoConexion.classList.remove('conectado');
      log('ERROR MQTT: ' + err.message);
    });

    window._publicarComando = (comando) => {
      if (!mqttClient || !tokenSuperadmin) {
        log('No hay conexión o token Superadmin aún.');
        return;
      }
      const payload = `${tokenSuperadmin}:${comando}`;
      mqttClient.publish(`pluo/${deviceId}/cmd`, payload);
      log('CMD: ' + payload);
    };
  }

  // --- Acciones expuestas a los botones (onclick inline) ---

  window.enviarSetSalida = function (n) {
    const tipo = document.getElementById(`tipo-${n}`).value;
    if (tipo === 'SIN_USAR') {
      log(`Salida ${n}: "Sin usar" es solo un filtro visual — elige un tipo real antes de guardar.`);
      return;
    }
    const sector = document.getElementById(`sector-${n}`).value || '0';
    const nombre = document.getElementById(`nombre-${n}`).value || `Salida${n}`;
    window._publicarComando(`SETSALIDA:${n}:${tipo}:${sector}:${nombre}`);
  };

  window.enviarSetCaudal = function () {
    const tipoAgua = document.getElementById('tipoAgua').value;
    const tipoFert = document.getElementById('tipoFert').value;
    window._publicarComando(`SETCAUDAL:${tipoAgua}:${tipoFert}`);
  };

  window.enviarSetCaudalSector = function () {
    const sector = document.getElementById('sectorCaudal').value;
    const caudal = document.getElementById('caudalEsperado').value;
    if (!sector || !caudal) { log('Faltan datos de sector/caudal.'); return; }
    window._publicarComando(`SETCAUDALSECTOR:${sector}:${caudal}`);
  };

  window.enviarSetZona = function () {
    const zona = document.getElementById('zonaHoraria').value;
    window._publicarComando(`SETZONA:${zona}`);
  };

  window.enviarSetHora = function () {
    const ahora = new Date();
    const campos = [
      ahora.getDate(),
      ahora.getMonth() + 1,
      ahora.getFullYear(),
      ahora.getHours(),
      ahora.getMinutes(),
      ahora.getSeconds()
    ].join(':');
    window._publicarComando(`SETHORA:${campos}`);
  };

  window.enviarSetTokenOp = function () {
    const token = document.getElementById('nuevoTokenOp').value;
    if (!token) { log('Falta el nuevo token Operador.'); return; }
    window._publicarComando(`SETTOKENOP:${token}`);
  };

  window.enviarSetTokenObs = function () {
    const token = document.getElementById('nuevoTokenObs').value;
    if (!token) { log('Falta el nuevo token Observador.'); return; }
    window._publicarComando(`SETTOKENOBS:${token}`);
  };

  window.enviarBloqueo = function (bloquear) {
    const comando = bloquear ? 'BLOQUEAR' : 'DESBLOQUEAR';
    if (!confirm(`¿Confirmas ${comando} este equipo?`)) return;
    window._publicarComando(comando);
  };

  window.enviarResetFallas = function () {
    window._publicarComando('RESETFALLAS');
  };
</script>

<script src="https://unpkg.com/mqtt@5.10.0/dist/mqtt.min.js"></script>

</body>
</html>
