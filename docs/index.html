<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluo — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1976D2;
    --azul-claro: #E8F4FB;
    --azul-oscuro: #0D4E96;
    --verde: #2FB65A;
    --alerta: #E24C4C;
    --texto: #1A2B33;
    --texto-tenue: #6B7C85;
    --blanco: #FFFFFF;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--azul);
    font-family: 'Manrope', sans-serif;
    color: var(--texto);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tarjeta {
    width: 100%;
    max-width: 400px;
    min-height: 100vh;
    background: var(--blanco);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 28px;
  }

  @media (min-width: 460px) {
    .tarjeta {
      min-height: auto;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      margin: 24px;
      padding: 44px 36px;
    }
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .logo-wrap img {
    width: 88px;
    height: 88px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    margin: 0 0 4px 0;
    color: var(--texto);
  }

  .subtitulo {
    text-align: center;
    color: var(--texto-tenue);
    font-size: 14px;
    margin: 0 0 32px 0;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--texto-tenue);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .campo { margin-bottom: 18px; }

  input {
    width: 100%;
    padding: 15px 16px;
    background: var(--azul-claro);
    border: 2px solid transparent;
    border-radius: 12px;
    color: var(--texto);
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  input:focus { border-color: var(--azul); }

  button {
    width: 100%;
    padding: 16px;
    background: var(--azul);
    color: var(--blanco);
    border: none;
    border-radius: 12px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 8px;
  }

  button:active { background: var(--azul-oscuro); }
  button:disabled { opacity: 0.5; }

  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--azul);
    outline-offset: 2px;
  }

  .mensaje {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }

  .mensaje.error {
    display: block;
    background: rgba(226, 76, 76, 0.1);
    border: 1px solid rgba(226, 76, 76, 0.3);
    color: #C4342F;
  }

  .estado-conexion {
    text-align: center;
    margin-top: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--texto-tenue);
    letter-spacing: 0.05em;
  }
</style>
</head>

  <h1>Pluo</h1>
  <p class="subtitulo">Riego inteligente — estado en vivo de tus equipos</p>

  <form id="formLogin">
    <div class="campo">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email">
    </div>
    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" id="btnEntrar">Entrar</button>
    <div class="mensaje" id="mensajeError"></div>
  </form>

  <div class="estado-conexion" id="estadoFirebase">conectando…</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfW9yzIoBAGxCvxZs6679Qn0_df_rkfZg",
    authDomain: "pluo-pantalla.firebaseapp.com",
    projectId: "pluo-pantalla",
    storageBucket: "pluo-pantalla.firebasestorage.app",
    messagingSenderId: "432080738709",
    appId: "1:432080738709:web:6b83df90372f981fa27e9c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const estadoFirebase = document.getElementById('estadoFirebase');
  const form = document.getElementById('formLogin');
  const btnEntrar = document.getElementById('btnEntrar');
  const mensajeError = document.getElementById('mensajeError');

  estadoFirebase.textContent = 'firebase: ok';

  // Etapa 2: si ya hay sesión activa, redirigir a la lista de unidades
  // en vez de solo dejar el log.
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'unidades.html';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    mensajeError.className = 'mensaje';
    mensajeError.textContent = '';
    btnEntrar.disabled = true;
    btnEntrar.textContent = 'Entrando…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged se encarga de la redirección a unidades.html
    } catch (err) {
      mensajeError.className = 'mensaje error';
      mensajeError.textContent = 'No se pudo iniciar sesión. Verifica correo y contraseña.';
      console.error(err.code, err.message);
    } finally {
      btnEntrar.disabled = false;
      btnEntrar.textContent = 'Entrar';
    }
  });
</script>
